name: pages

# Publishes the catalog to GitHub Pages on every push to main. Needs
# Settings -> Pages -> Source -> GitHub Actions, set once.

on:
  push:
    branches: [main]
  # Lets a deploy be re-run without an empty commit — e.g. after enabling Pages for the
  # first time, when the first push already went by.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Never publish two builds at once. cancel-in-progress is false on purpose: cancelling a
# half-finished deploy is how Pages ends up serving a partial site.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Required — see site-build.yml.
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: site/package-lock.json

      - uses: actions/configure-pages@v5

      - name: Build the catalog index
        run: npm run build:index

      - name: Install site dependencies
        run: npm ci
        working-directory: site

      - name: Build the site
        # GITHUB_REPOSITORY is set by Actions; vite.config.ts derives the Pages base path
        # (/<repo>/) and build-index.mjs derives the GitHub links from it.
        run: npm run build
        working-directory: site

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
